version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobmatch_postgres
    environment:
      POSTGRES_USER: jobmatch
      POSTGRES_PASSWORD: jobmatch
      POSTGRES_DB: jobmatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobmatch -d jobmatch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
