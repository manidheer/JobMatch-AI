version: "3.9"

# Production docker-compose — requires SSL certs in ./nginx/ssl/
# Setup: see DEPLOYMENT.md
#
# 1. Copy backend/.env.example → backend/.env and fill in all values
# 2. Place SSL certs:  nginx/ssl/fullchain.pem  and  nginx/ssl/privkey.pem
#    (from Let's Encrypt / certbot)
# 3. Run: docker-compose -f docker-compose.prod.yml up -d

services:

  postgres:
    image: postgres:16-alpine
    container_name: jobmatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-jobmatch}
      POSTGRES_PASSWORD: ${DB_PASSWORD}          # required — set in .env
      POSTGRES_DB: ${DB_NAME:-jobmatch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jobmatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobmatch_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-jobmatch}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-jobmatch}
      SYNC_DATABASE_URL: postgresql://${DB_USER:-jobmatch}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-jobmatch}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""   # empty = same origin (proxied through nginx)
    container_name: jobmatch_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: jobmatch_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

volumes:
  postgres_data:
  uploads:

networks:
  internal:
    driver: bridge
